version: '3.8'

services:
  proabsence:
    image: sserafinroboczy/proabsence:1.0.0
    container_name: proabsence
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-super-secret-production-key-change-me}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - proabsence_db:/app/database.sqlite
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  proabsence_db:
