# ProAbsence v1.0.0
# System zarządzania obecnością pracowników
# Autor: Sebastian Serafin

version: '3.8'

services:
  # Backend + API
  backend:
    image: sserafinroboczy/proabsence:1.0.0
    container_name: proabsence-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - proabsence_data:/app/data
      - ./backups:/app/backups
    networks:
      - proabsence-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (serwowany przez backend w tej aplikacji)
  # W tej architekturze frontend jest wbudowany w backend (SPA)
  # Jeśli potrzebny osobny nginx, odkomentuj poniżej:
  
  # frontend:
  #   image: nginx:alpine
  #   container_name: proabsence-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - proabsence-network

networks:
  proabsence-network:
    driver: bridge

volumes:
  proabsence_data:
